<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Activity"/>
<title>Activity Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0b0f;--surface:#13131a;--surface2:#1a1a24;--border:#22222e;
  --text:#f0edf8;--text2:#8884a0;
  --pink:#ff6ef7;--purple:#b96eff;--teal:#4ef0d4;--yellow:#ffe16e;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;}
#app{max-width:500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.88);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .25s ease forwards;}
.pop{animation:pop .25s cubic-bezier(.175,.885,.32,1.275) forwards;}
.slide-in{animation:slideIn .2s ease forwards;}
.shimmer-bg{background:linear-gradient(90deg,var(--pink),var(--purple),var(--teal),var(--pink));background-size:200% auto;animation:shimmer 3s linear infinite;}
.rainbow-text{background:linear-gradient(90deg,var(--pink),var(--purple),var(--teal));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;}

.header{padding:max(env(safe-area-inset-top),20px) 20px 0;}
.rainbow-bar{height:4px;border-radius:2px;margin-bottom:18px;}
.header-inner{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.app-title{font-family:'DM Serif Display',serif;font-size:26px;}
.view-toggle{display:flex;background:var(--surface);border-radius:20px;padding:3px;border:1px solid var(--border);}
.view-btn{padding:6px 12px;border-radius:16px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;color:var(--text2);background:transparent;}
.view-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 0 14px #ff6ef755;}

.content{flex:1;padding:16px 16px 100px;}

/* calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-month{font-family:'DM Serif Display',serif;font-size:22px;}
.cal-nav{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cal-nav:hover{border-color:var(--purple);color:var(--purple);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:4px 0;letter-spacing:1px;}
.cal-day{aspect-ratio:1;border-radius:10px;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:var(--surface);gap:2px;}
.cal-day:hover{border-color:var(--purple);}
.cal-day.empty{background:transparent;cursor:default;border:none;}
.cal-day.today{border-color:var(--pink);box-shadow:0 0 10px #ff6ef733;}
.cal-day.selected{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent;box-shadow:0 0 16px #b96eff66;}
.cal-day.has-data{background:var(--surface2);}
.dot-wrap{display:flex;gap:2px;justify-content:center;}
.dot{width:5px;height:5px;border-radius:50%;}
.day-num{font-size:12px;font-weight:700;line-height:1;}

/* activity pills */
.activity-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid;display:inline-block;}
.diet-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.diet-yes{background:#4ef0d422;border:1px solid #4ef0d477;color:var(--teal);}
.diet-no{background:#ff6ef722;border:1px solid #ff6ef755;color:var(--pink);}

/* staged activities (pending list) */
.staged-wrap{margin-bottom:12px;}
.staged-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:6px;}
.staged-label{font-size:13px;font-weight:700;}
.staged-time{font-size:12px;color:var(--text2);}

/* activity builder card */
.builder-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:12px;}
.builder-card.active{border-color:var(--purple)33;box-shadow:0 0 20px #b96eff0d;}
.form-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:block;}
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.chip.selected{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent;color:#fff;box-shadow:0 0 12px #b96eff55;}
.chip.add-chip{border-style:dashed;color:var(--purple);}

/* add activity button */
.add-act-btn{width:100%;padding:13px;border:1.5px dashed var(--purple);border-radius:14px;background:transparent;color:var(--purple);font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;}
.add-act-btn:hover{background:#b96eff11;}
.confirm-act-btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;box-shadow:0 0 14px #b96eff44;}
.confirm-act-btn:disabled{opacity:0.35;cursor:default;box-shadow:none;}

/* diet & wellness */
.diet-row{display:flex;gap:10px;}
.diet-btn{flex:1;padding:12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.diet-btn.yes.selected{background:#4ef0d422;border-color:var(--teal);color:var(--teal);box-shadow:0 0 12px #4ef0d433;}
.diet-btn.no.selected{background:#ff6ef722;border-color:var(--pink);color:var(--pink);box-shadow:0 0 12px #ff6ef733;}
.wellness-toggle{width:100%;background:none;border:1px dashed var(--border);border-radius:14px;padding:12px 16px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;margin-bottom:12px;}
.wellness-toggle:hover{border-color:var(--purple);color:var(--purple);}
.wellness-toggle.open{border-color:var(--purple);color:var(--purple);}
.wellness-section{background:var(--surface);border:1px solid #b96eff33;border-radius:20px;padding:18px;margin-bottom:12px;}
.wellness-row{margin-bottom:14px;}
.wellness-row:last-child{margin-bottom:0;}
.w-chips{display:flex;gap:7px;flex-wrap:wrap;}
.w-chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.w-chip.high.selected{background:#4ef0d422;border-color:var(--teal);color:var(--teal);}
.w-chip.avg.selected{background:#b96eff22;border-color:var(--purple);color:var(--purple);}
.w-chip.low.selected{background:#ff6ef722;border-color:var(--pink);color:var(--pink);}
.w-chip.yes-sel.selected{background:#ff6ef722;border-color:var(--pink);color:var(--pink);}
.w-chip.no-sel.selected{background:#4ef0d422;border-color:var(--teal);color:var(--teal);}

.save-btn{width:100%;padding:15px;border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 0 24px #b96eff55;letter-spacing:.3px;}
.save-btn:active{transform:scale(0.98);}
.save-btn:disabled{opacity:0.35;cursor:default;box-shadow:none;animation:none;background:#444;}

/* streak */
.streak-row{display:flex;gap:8px;margin-bottom:16px;}
.streak-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.streak-num{font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.streak-label{font-size:9px;color:var(--text2);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* log cards */
.log-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;}
.log-date{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.day-title{font-family:'DM Serif Display',serif;font-size:20px;}
.clear-btn{font-size:12px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:10px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.clear-btn:hover{color:var(--pink);border-color:var(--pink);}
.delete-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:6px;}
.delete-btn:hover{color:var(--pink);}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(11,11,15,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px;}
.modal h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.modal-btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.modal-confirm{background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff;}
.modal-cancel{background:var(--surface2);color:var(--text2);}
.custom-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;width:100%;}
.custom-input:focus{outline:none;border-color:var(--purple);}
.list-empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;line-height:1.8;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="rainbow-bar shimmer-bg"></div>
    <div class="header-inner">
      <div class="app-title rainbow-text">Activity Log</div>
      <div class="view-toggle">
        <button class="view-btn active" id="vbtn-calendar" onclick="setView('calendar')">📅 Cal</button>
        <button class="view-btn" id="vbtn-list" onclick="setView('list')">📋 List</button>
      </div>
    </div>
  </div>
  <div id="main"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <h3 id="modal-title">Add custom</h3>
    <input class="custom-input" id="modal-input" placeholder="Type here…"/>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-confirm" onclick="confirmModal()">Add</button>
    </div>
  </div>
</div>

<script>
const PRESET_ACTS  = ["PT","Weights","Swimming","Aquafit","Walk"];
const PRESET_TIMES = ["<30 min","30 min","1 hour","1.5 hours","2 hours","2+ hours"];
const ACT_COLORS   = [
  ["#ff6ef7","#ff6ef730"],["#b96eff","#b96eff30"],["#4ef0d4","#4ef0d430"],
  ["#ff9de8","#ff9de830"],["#ffe16e","#ffe16e30"],["#6ee2ff","#6ee2ff30"],
  ["#a0ff6e","#a0ff6e30"],["#ff6e9d","#ff6e9d30"],
];
const DOT_COLS = ["#ff6ef7","#b96eff","#4ef0d4","#ff9de8","#ffe16e","#6ee2ff"];

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let logs        = load("act3_logs",{});
let customActs  = load("act3_cacts",[]);
let customTimes = load("act3_ctimes",[]);
let view        = "calendar";
let calYear     = new Date().getFullYear();
let calMonth    = new Date().getMonth();
let selectedDay = todayKey();
let wellnessOpen = false;
let modalMode   = null;

// ── FORM STATE ────────────────────────────────────────────────────────────────
// stagedActs: activities built up before saving [{name,time}, ...]
// builderAct / builderTime: the one currently being built in the picker
let stagedActs  = [];
let builderAct  = null;
let builderTime = null;
let fDiet       = null;
let fEnergy=null, fDigestion=null, fMood=null, fHeadache=null;

function todayKey(){return new Date().toISOString().slice(0,10);}
function fmt(dk){const d=new Date(dk+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function actColor(name){
  const all=[...PRESET_ACTS,...customActs];
  const i=Math.max(0,all.indexOf(name))%ACT_COLORS.length;
  return ACT_COLORS[i];
}
function dotCol(i){return DOT_COLS[i%DOT_COLS.length];}
function totalSessions(){return Object.keys(logs).length;}
function dietDays(){return Object.values(logs).filter(l=>l.diet===true).length;}
function wellnessDays(){return Object.values(logs).filter(l=>l.wellness&&Object.values(l.wellness).some(v=>v!==null)).length;}
function currentStreak(){
  let streak=0; const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if(logs[k]&&logs[k].activities.length>0) streak++;
    else if(i>0) break;
  }
  return streak;
}

function resetBuilder(){builderAct=null;builderTime=null;}
function resetForm(){stagedActs=[];resetBuilder();fDiet=null;fEnergy=null;fDigestion=null;fMood=null;fHeadache=null;}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('main').innerHTML = view==='calendar' ? renderCal() : renderList();
}
function setView(v){
  view=v;
  ['calendar','list'].forEach(id=>document.getElementById('vbtn-'+id).classList.toggle('active',id===v));
  render();
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCal(){
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=todayKey();
  const log=logs[selectedDay];

  let html=`<div class="content fade-up">`;

  // Stats
  html+=`<div class="streak-row">
    <div class="streak-card"><div class="streak-num">${totalSessions()}</div><div class="streak-label">Days</div></div>
    <div class="streak-card"><div class="streak-num">${currentStreak()}</div><div class="streak-label">Streak</div></div>
    <div class="streak-card"><div class="streak-num">${dietDays()}</div><div class="streak-label">Diet</div></div>
    <div class="streak-card"><div class="streak-num">${wellnessDays()}</div><div class="streak-label">Wellness</div></div>
  </div>`;

  // Calendar
  html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:16px;">
    <div class="cal-header">
      <button class="cal-nav" onclick="prevMonth()">‹</button>
      <div class="cal-month">${MONTHS[calMonth]} ${calYear}</div>
      <button class="cal-nav" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid">
      ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div class="cal-day empty"></div>').join('')}`;

  for(let day=1;day<=daysInMonth;day++){
    const dk=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=dk===todayStr, isSel=dk===selectedDay;
    const l=logs[dk];
    const hasActs=l&&l.activities.length>0;
    const hasW=l&&l.wellness&&Object.values(l.wellness).some(v=>v!==null);
    const hasData=l&&(hasActs||l.diet!==null||hasW);
    let cls='cal-day'+(isToday?' today':'')+(isSel?' selected':hasData?' has-data':'');
    let dots='';
    if(hasData&&!isSel){
      dots=`<div class="dot-wrap">
        ${(l.activities||[]).slice(0,3).map((_,i)=>`<div class="dot" style="background:${dotCol(i)};"></div>`).join('')}
        ${l.diet===true?`<div class="dot" style="background:var(--teal);"></div>`:''}
        ${hasW?`<div class="dot" style="background:var(--yellow);"></div>`:''}
      </div>`;
    }
    html+=`<div class="${cls}" onclick="selectDay('${dk}')">
      <div class="day-num" style="${isSel?'color:#fff':isToday?'color:var(--pink)':''}">${day}</div>
      ${dots}
    </div>`;
  }
  html+=`</div></div>`;

  // Selected day header
  const hasLog=log&&(log.activities.length>0||log.diet!==null||(log.wellness&&Object.values(log.wellness).some(v=>v!==null)));
  html+=`<div class="day-header">
    <div class="day-title">${fmt(selectedDay)}</div>
    ${hasLog?`<button class="clear-btn" onclick="clearDay('${selectedDay}')">Clear day</button>`:''}
  </div>`;

  // Saved activities for this day
  if(log&&log.activities.length>0){
    log.activities.forEach((a,i)=>{
      const [c,bg]=actColor(a.name);
      html+=`<div class="log-card pop" style="border-color:${c}44;padding:12px 14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <span class="activity-pill" style="background:${bg};border-color:${c};color:${c};">${a.name}</span>
            <span style="font-size:13px;color:var(--text2);">⏱ ${a.time}</span>
          </div>
          <button class="delete-btn" onclick="deleteSavedActivity('${selectedDay}',${i})">✕</button>
        </div>
      </div>`;
    });
  }

  // Saved diet & wellness
  if(log&&(log.diet!==null||(log.wellness&&Object.values(log.wellness).some(v=>v!==null)))){
    html+=`<div class="log-card" style="margin-bottom:12px;">`;
    if(log.diet!==null){
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:${log.wellness&&Object.values(log.wellness).some(v=>v!==null)?'10px':'0'};">
        <span style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;">Diet</span>
        <span class="diet-badge ${log.diet?'diet-yes':'diet-no'}">${log.diet?'✓ Yes':'✗ No'}</span>
        <button class="delete-btn" style="margin-left:auto;" onclick="clearDiet('${selectedDay}')">✕</button>
      </div>`;
    }
    if(log.wellness){
      const w=log.wellness;
      const entries=[
        w.energy&&['⚡ Energy',w.energy],
        w.digestion&&['🌿 Digestion',w.digestion],
        w.mood&&['😊 Mood',w.mood],
        (w.headache!==null&&w.headache!==undefined)&&['🤕 Headache',w.headache?'Yes':'No'],
      ].filter(Boolean);
      if(entries.length){
        html+=`<div style="display:flex;flex-direction:column;gap:6px;">`;
        entries.forEach(([label,val])=>{
          const col=val==='Above avg'||val==='No'?'var(--teal)':val==='Low'||val==='Yes'?'var(--pink)':'var(--purple)';
          html+=`<div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:11px;color:var(--text2);font-weight:600;min-width:90px;">${label}</span>
            <span style="font-size:12px;font-weight:700;color:${col};">${val}</span>
          </div>`;
        });
        html+=`<button class="delete-btn" style="font-size:11px;color:var(--text2);margin-top:4px;text-align:left;" onclick="clearWellness('${selectedDay}')">Clear wellness</button>`;
        html+=`</div>`;
      }
    }
    html+=`</div>`;
  }

  // ── ACTIVITY BUILDER ──────────────────────────────────────────────────────
  html+=renderActivityBuilder();

  // ── DIET ──────────────────────────────────────────────────────────────────
  html+=`<div class="builder-card">
    <span class="form-label">Elimination Diet Today?</span>
    <div class="diet-row">
      <button class="diet-btn yes${fDiet===true?' selected':''}" onclick="pick('diet',true)">✓ Yes</button>
      <button class="diet-btn no${fDiet===false?' selected':''}" onclick="pick('diet',false)">✗ No</button>
    </div>
  </div>`;

  // ── WELLNESS ──────────────────────────────────────────────────────────────
  html+=`<button class="wellness-toggle${wellnessOpen?' open':''}" onclick="toggleWellness()">
    <span>🌡️ Wellness Notes <span style="font-size:11px;opacity:.6;">(optional)</span></span>
    <span style="font-size:18px;transition:transform .2s;display:inline-block;transform:rotate(${wellnessOpen?'-90':'90'}deg);">›</span>
  </button>`;

  if(wellnessOpen){
    html+=`<div class="wellness-section fade-up">
      <div class="wellness-row">
        <span class="form-label">⚡ Energy</span>
        <div class="w-chips">
          <button class="w-chip high${fEnergy==='Above avg'?' selected':''}" onclick="pickW('energy','Above avg')">Above avg</button>
          <button class="w-chip avg${fEnergy==='Average'?' selected':''}" onclick="pickW('energy','Average')">Average</button>
          <button class="w-chip low${fEnergy==='Low'?' selected':''}" onclick="pickW('energy','Low')">Low</button>
        </div>
      </div>
      <div class="wellness-row">
        <span class="form-label">🌿 Digestion</span>
        <div class="w-chips">
          <button class="w-chip high${fDigestion==='Above avg'?' selected':''}" onclick="pickW('digestion','Above avg')">Above avg</button>
          <button class="w-chip avg${fDigestion==='Average'?' selected':''}" onclick="pickW('digestion','Average')">Average</button>
          <button class="w-chip low${fDigestion==='Low'?' selected':''}" onclick="pickW('digestion','Low')">Low</button>
        </div>
      </div>
      <div class="wellness-row">
        <span class="form-label">😊 Mood</span>
        <div class="w-chips">
          <button class="w-chip high${fMood==='Above avg'?' selected':''}" onclick="pickW('mood','Above avg')">Above avg</button>
          <button class="w-chip avg${fMood==='Average'?' selected':''}" onclick="pickW('mood','Average')">Average</button>
          <button class="w-chip low${fMood==='Low'?' selected':''}" onclick="pickW('mood','Low')">Low</button>
        </div>
      </div>
      <div class="wellness-row">
        <span class="form-label">🤕 Headache</span>
        <div class="w-chips">
          <button class="w-chip yes-sel${fHeadache===true?' selected':''}" onclick="pickW('headache',true)">Yes</button>
          <button class="w-chip no-sel${fHeadache===false?' selected':''}" onclick="pickW('headache',false)">No</button>
        </div>
      </div>
      <button onclick="saveWellness()" ${(fEnergy===null&&fDigestion===null&&fMood===null&&fHeadache===null)?'disabled':''} style="width:100%;margin-top:4px;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--teal));color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;opacity:${(fEnergy===null&&fDigestion===null&&fMood===null&&fHeadache===null)?0.35:1};box-shadow:${(fEnergy===null&&fDigestion===null&&fMood===null&&fHeadache===null)?'none':'0 0 16px #b96eff44'};">
        💜 Save Wellness Notes
      </button>
    </div>`;
  }

  // Save all button
  const hasAnything = stagedActs.length>0||fDiet!==null;
  html+=`<button class="save-btn shimmer-bg" onclick="saveLog()" ${!hasAnything?'disabled':''}>
    ${hasAnything?'Save Entry':'Select an activity or diet above'}
  </button>`;

  html+=`</div>`;
  return html;
}

function renderActivityBuilder(){
  const allActs=[...PRESET_ACTS,...customActs];
  const allTimes=[...PRESET_TIMES,...customTimes];
  let html='';

  // Staged (queued) activities
  if(stagedActs.length>0){
    html+=`<div class="staged-wrap">`;
    stagedActs.forEach((a,i)=>{
      const [c,bg]=actColor(a.name);
      html+=`<div class="staged-item slide-in">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="activity-pill" style="background:${bg};border-color:${c};color:${c};padding:4px 10px;font-size:11px;">${a.name}</span>
          <span class="staged-time">⏱ ${a.time}</span>
        </div>
        <button class="delete-btn" onclick="removeStagedAct(${i})">✕</button>
      </div>`;
    });
    html+=`</div>`;
  }

  // Builder: pick activity + time
  html+=`<div class="builder-card${builderAct||builderTime?' active':''}">
    <span class="form-label">${stagedActs.length>0?'Add Another Activity':'Activity'}</span>
    <div class="chips-wrap" style="margin-bottom:14px;">
      ${allActs.map(a=>`<button class="chip${builderAct===a?' selected':''}" onclick="pickBuilder('act','${a}')">${a}</button>`).join('')}
      <button class="chip add-chip" onclick="openModal('activity')">+ Custom</button>
    </div>
    <span class="form-label">Time Spent</span>
    <div class="chips-wrap">
      ${allTimes.map(t=>`<button class="chip${builderTime===t?' selected':''}" onclick="pickBuilder('time','${t}')">${t}</button>`).join('')}
      <button class="chip add-chip" onclick="openModal('time')">+ Custom</button>
    </div>
    <button class="confirm-act-btn" onclick="confirmActivity()" ${(!builderAct||!builderTime)?'disabled':''}>
      ${stagedActs.length>0?'+ Add This Activity':'+ Add Activity'}
    </button>
  </div>`;

  return html;
}

// ── LIST VIEW ─────────────────────────────────────────────────────────────────
function renderList(){
  const entries=Object.entries(logs)
    .filter(([,l])=>l.activities.length>0||l.diet!==null||(l.wellness&&Object.values(l.wellness).some(v=>v!==null)))
    .sort(([a],[b])=>b.localeCompare(a));

  let html=`<div class="content fade-up">
    <div class="streak-row">
      <div class="streak-card"><div class="streak-num">${totalSessions()}</div><div class="streak-label">Days</div></div>
      <div class="streak-card"><div class="streak-num">${currentStreak()}</div><div class="streak-label">Streak</div></div>
      <div class="streak-card"><div class="streak-num">${dietDays()}</div><div class="streak-label">Diet</div></div>
      <div class="streak-card"><div class="streak-num">${wellnessDays()}</div><div class="streak-label">Wellness</div></div>
    </div>`;

  if(!entries.length){
    html+=`<div class="list-empty">📋<br><br>No entries yet.<br>Switch to Calendar to log your first activity!</div>`;
  } else {
    entries.forEach(([dk,l])=>{
      const isToday=dk===todayKey();
      const w=l.wellness||{};
      const hasW=Object.values(w).some(v=>v!==null&&v!==undefined);
      html+=`<div class="log-card fade-up" style="${isToday?'border-color:var(--pink);box-shadow:0 0 12px #ff6ef722;':''}">
        <div class="log-date">${fmt(dk)}${isToday?' · <span style="color:var(--pink)">Today</span>':''}</div>
        ${l.activities.length>0?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:${l.diet!==null||hasW?'10px':'0'};">
          ${l.activities.map(a=>{const[c,bg]=actColor(a.name);return`<span class="activity-pill" style="background:${bg};border-color:${c};color:${c};">${a.name} · ${a.time}</span>`;}).join('')}
        </div>`:''}
        ${l.diet!==null?`<div style="margin-bottom:${hasW?'8px':'0'};"><span class="diet-badge ${l.diet?'diet-yes':'diet-no'}">${l.diet?'✓ Elimination Diet':'✗ No Diet'}</span></div>`:''}
        ${hasW?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;">
          ${w.energy?`<span style="padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:${w.energy==='Above avg'?'var(--teal)':w.energy==='Low'?'var(--pink)':'var(--purple)'};">⚡ ${w.energy}</span>`:''}
          ${w.digestion?`<span style="padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:${w.digestion==='Above avg'?'var(--teal)':w.digestion==='Low'?'var(--pink)':'var(--purple)'};">🌿 ${w.digestion}</span>`:''}
          ${w.mood?`<span style="padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:${w.mood==='Above avg'?'var(--teal)':w.mood==='Low'?'var(--pink)':'var(--purple)'};">😊 ${w.mood}</span>`:''}
          ${w.headache!==null&&w.headache!==undefined?`<span style="padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:${w.headache?'var(--pink)':'var(--teal)'};">🤕 ${w.headache?'Headache':'No headache'}</span>`:''}
        </div>`:''}
      </div>`;
    });
  }
  html+=`</div>`;
  return html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function selectDay(dk){selectedDay=dk;resetForm();render();}
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();}
function toggleWellness(){wellnessOpen=!wellnessOpen;render();}

function pickBuilder(field,val){
  if(field==='act')  builderAct  = builderAct===val?null:val;
  if(field==='time') builderTime = builderTime===val?null:val;
  render();
}
function confirmActivity(){
  if(!builderAct||!builderTime) return;
  stagedActs.push({name:builderAct,time:builderTime});
  resetBuilder();
  render();
}
function removeStagedAct(i){stagedActs.splice(i,1);render();}

function pick(field,val){
  if(field==='diet') fDiet = fDiet===val?null:val;
  render();
}
function pickW(field,val){
  if(field==='energy')    fEnergy    = fEnergy===val?null:val;
  if(field==='digestion') fDigestion = fDigestion===val?null:val;
  if(field==='mood')      fMood      = fMood===val?null:val;
  if(field==='headache')  fHeadache  = fHeadache===val?null:val;
  render();
}

function saveLog(){
  const dk=selectedDay;
  if(!logs[dk]) logs[dk]={activities:[],diet:null,wellness:{energy:null,digestion:null,mood:null,headache:null}};
  if(!logs[dk].wellness) logs[dk].wellness={energy:null,digestion:null,mood:null,headache:null};

  stagedActs.forEach(a=>logs[dk].activities.push(a));
  if(fDiet!==null) logs[dk].diet=fDiet;

  save("act3_logs",logs);
  stagedActs=[]; resetBuilder(); fDiet=null;
  render();
}

function saveWellness(){
  const dk=selectedDay;
  if(!logs[dk]) logs[dk]={activities:[],diet:null,wellness:{energy:null,digestion:null,mood:null,headache:null}};
  if(!logs[dk].wellness) logs[dk].wellness={energy:null,digestion:null,mood:null,headache:null};

  if(fEnergy!==null) logs[dk].wellness.energy=fEnergy;
  if(fDigestion!==null) logs[dk].wellness.digestion=fDigestion;
  if(fMood!==null) logs[dk].wellness.mood=fMood;
  if(fHeadache!==null) logs[dk].wellness.headache=fHeadache;

  save("act3_logs",logs);
  fEnergy=null; fDigestion=null; fMood=null; fHeadache=null;
  wellnessOpen=false;
  render();
}

function deleteSavedActivity(dk,idx){
  logs[dk].activities.splice(idx,1);
  pruneLog(dk);
  save("act3_logs",logs);render();
}
function clearDiet(dk){if(logs[dk]){logs[dk].diet=null;pruneLog(dk);}save("act3_logs",logs);render();}
function clearWellness(dk){
  if(logs[dk]) logs[dk].wellness={energy:null,digestion:null,mood:null,headache:null};
  pruneLog(dk);save("act3_logs",logs);render();
}
function clearDay(dk){delete logs[dk];resetForm();save("act3_logs",logs);render();}
function pruneLog(dk){
  if(logs[dk]&&!logs[dk].activities.length&&logs[dk].diet===null&&!Object.values(logs[dk].wellness||{}).some(v=>v!==null))
    delete logs[dk];
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(mode){
  modalMode=mode;
  document.getElementById('modal-title').textContent=mode==='activity'?'Add Activity':'Add Time';
  document.getElementById('modal-input').value='';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
}
function closeModal(){document.getElementById('modal').style.display='none';}
function confirmModal(){
  const val=document.getElementById('modal-input').value.trim();
  if(!val){closeModal();return;}
  if(modalMode==='activity'){if(!customActs.includes(val)){customActs.push(val);save("act3_cacts",customActs);}builderAct=val;}
  else{if(!customTimes.includes(val)){customTimes.push(val);save("act3_ctimes",customTimes);}builderTime=val;}
  closeModal();render();
}
document.getElementById('modal-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

render();
</script>
</body>
</html>
